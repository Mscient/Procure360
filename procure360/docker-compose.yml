version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: procure360_backend
    ports:
      - "8000:8000"
    volumes:
      # Map the local backend/data directory so the SQLite DB persists across container restarts
      - ./backend/data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: procure360_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
